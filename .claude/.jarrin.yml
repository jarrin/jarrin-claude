# Per-repo Claude config for jarrin-claude. See CLAUDE.md for the full schema.

# Tier a — global rule slugs. This repo now ships the `claudjar` CLI (a strict
# TypeScript app: pnpm, Vitest, ESLint + Prettier, bundled with tsup), so the
# lang-ts stack genuinely applies here. The Markdown rule library and skills live
# alongside it, but the tooling to build and test is TypeScript.
rules:
  - lang-ts

# Dev-command quick reference.
commands:
  - cmd: pnpm check
    desc: full gate — lint + typecheck + Vitest + build + fresh dist
  - cmd: pnpm test
    desc: run the Vitest suite (session-start, config, interaction)
  - cmd: bin/claudjar install
    desc: (re)create the ~/.claude symlinks; idempotent
  - cmd: pnpm run ensurepath
    desc: build and install the `claudjar` command globally on PATH
  - cmd: claudjar info
    desc: show this repo's resolved rules, commands, backlog, worktree, and skills
  - cmd: claudjar worktree create <name>
    desc: add a git worktree and bootstrap it from the worktree: config

# Backlog routing. Skill-consumed: the session-start hook uses a real YAML parser
# now, but deliberately ignores this block — it is owned by the staged-planning
# and todo skills, not the hook.
#
# The code lives on github.com/jarrin/jarrin-claude, but only the Gitea MCP is
# connected — so the backlog is homed on Gitea while the code stays on GitHub.
backlog:
  repo: jarrin/jarrin-claude
  plan:
    method: gitea
    assignee: claude
  todo:
    method: gitea
    assignee: claude
